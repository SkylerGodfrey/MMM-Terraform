<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canvas v2 Editor</title>
<style>
  :root {
    --bg: #11141a;
    --panel: #1a1f29;
    --panel-elev: #232a37;
    --line: #2b3342;
    --ink: #d6dce6;
    --ink-dim: #8a93a3;
    --accent: #f0b454;
    --accent-dim: rgba(240, 180, 84, 0.18);
    --danger: #e0625c;
    --success: #5fb878;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; }

  /* ---------- toolbar ---------- */
  header { display: flex; align-items: center; gap: 14px; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--line); }
  header .title { font-weight: 600; letter-spacing: 0.02em; }
  header .title .v2 { color: var(--accent); font-weight: 500; }
  header .tabs { display: flex; gap: 4px; flex: 1; overflow-x: auto; }
  .tab { padding: 6px 14px; border-radius: 18px; cursor: pointer;
    background: var(--panel-elev); color: var(--ink-dim);
    border: 1px solid transparent; user-select: none; white-space: nowrap; }
  .tab.active { color: var(--accent); border-color: var(--accent-dim);
    background: var(--accent-dim); }
  .tab:hover:not(.active) { color: var(--ink); background: var(--line); }
  .tab .x { margin-left: 8px; opacity: 0.4; }
  .tab .x:hover { opacity: 1; color: var(--danger); }
  button { background: var(--panel-elev); color: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 12px; cursor: pointer; font: inherit; }
  button:hover { background: var(--line); }
  button.primary { background: var(--accent); color: #11141a; border-color: var(--accent);
    font-weight: 600; }
  button.primary:hover { background: #f4c275; }
  button.primary:disabled { background: var(--panel-elev); color: var(--ink-dim);
    cursor: not-allowed; }
  button.subtle { padding: 4px 8px; font-size: 12px; }
  .save-status { color: var(--ink-dim); font-size: 12px; min-width: 80px; text-align: right; }
  .save-status.dirty { color: var(--accent); }
  .save-status.ok { color: var(--success); }
  .save-status.err { color: var(--danger); }

  /* ---------- main split ---------- */
  main { display: grid; grid-template-columns: 260px 1fr; height: calc(100% - 49px); }
  aside.modules { background: var(--panel); border-right: 1px solid var(--line);
    overflow-y: auto; padding: 14px 12px; }
  aside.modules h2 { margin: 0 0 10px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--ink-dim); }
  .module-card { display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 8px 10px; margin-bottom: 4px; border-radius: 5px;
    background: var(--panel-elev); cursor: grab; border: 1px solid transparent; }
  .module-card:hover { border-color: var(--line); }
  .module-card.placed { opacity: 0.55; }
  .module-card .name { font-family: ui-monospace, "SF Mono", monospace; font-size: 12px; }
  .module-card .pages { font-size: 10px; color: var(--ink-dim); }

  /* ---------- canvas ---------- */
  section.viewport { display: flex; align-items: center; justify-content: center;
    background: var(--bg); position: relative; overflow: hidden; padding: 24px; }
  .canvas {
    position: relative; background: #0a0d12;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: var(--grid-px) var(--grid-px);
    border: 1px solid var(--line);
    box-shadow: 0 6px 32px rgba(0,0,0,0.4);
  }
  .slot {
    position: absolute; background: rgba(240, 180, 84, 0.07);
    border: 1px solid var(--accent-dim); border-radius: 2px;
    color: var(--accent); cursor: grab; user-select: none;
    display: flex; align-items: flex-start; padding: 4px 6px;
    font-family: ui-monospace, "SF Mono", monospace; font-size: 11px;
    overflow: hidden;
  }
  .slot.selected { border-color: var(--accent); background: rgba(240, 180, 84, 0.14);
    box-shadow: 0 0 0 1px var(--accent); z-index: 100; }
  .slot.dragging { cursor: grabbing; opacity: 0.85; }
  .slot .info { pointer-events: none; }
  .handle { position: absolute; background: var(--accent); width: 10px; height: 10px;
    border-radius: 50%; border: 2px solid #0a0d12; }
  .handle.nw { top: -5px; left: -5px; cursor: nw-resize; }
  .handle.ne { top: -5px; right: -5px; cursor: ne-resize; }
  .handle.sw { bottom: -5px; left: -5px; cursor: sw-resize; }
  .handle.se { bottom: -5px; right: -5px; cursor: se-resize; }
  .empty-canvas-note { position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); color: var(--ink-dim);
    font-size: 13px; max-width: 70%; text-align: center; pointer-events: none; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    padding: 10px 18px; border-radius: 6px; background: var(--panel-elev);
    border: 1px solid var(--line); color: var(--ink); font-size: 13px;
    opacity: 0; transition: opacity 0.18s; pointer-events: none; max-width: 480px; }
  .toast.show { opacity: 1; }
  .toast.err { border-color: var(--danger); color: #f4a39e; }
  .toast.ok { border-color: var(--success); color: #b3e2c1; }

  /* ---------- HOM-111: overlap warning ---------- */
  .slot.overlap { border-color: var(--danger); box-shadow: 0 0 0 1px var(--danger); }
  .slot.overlap.selected { box-shadow: 0 0 0 2px var(--danger); }
  .overlap-banner { padding: 6px 10px; background: rgba(224, 98, 92, 0.16);
    color: #f4a39e; font-size: 12px; border-bottom: 1px solid var(--danger);
    display: none; }
  .overlap-banner.show { display: flex; align-items: center; gap: 10px; }
  .overlap-banner button.subtle { color: #f4a39e; border-color: rgba(224,98,92,0.4); }

  /* ---------- HOM-111: debug toggle ---------- */
  button.toggle { width: 30px; padding: 5px 0; }
  button.toggle.on { background: var(--accent-dim); color: var(--accent);
    border-color: var(--accent-dim); }

  /* ---------- HOM-111: view switcher ---------- */
  .view-pill { display: inline-flex; background: var(--panel-elev);
    border-radius: 16px; padding: 2px; gap: 2px; }
  .view-pill button { background: transparent; border: 0; padding: 4px 12px;
    border-radius: 14px; color: var(--ink-dim); font-size: 12px; }
  .view-pill button.active { background: var(--accent); color: #11141a; font-weight: 600; }

  /* ---------- HOM-120: canvas size inputs ---------- */
  .canvas-size { display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-dim); }
  .canvas-size input { width: 56px; background: var(--panel-elev); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px; padding: 4px 6px;
    font: inherit; font-family: ui-monospace, "SF Mono", monospace;
    font-size: 12px; text-align: right; }
  .canvas-size input:focus { outline: none; border-color: var(--accent); }
  .canvas-size .x { color: var(--ink-dim); opacity: 0.6; }

  /* ---------- HOM-111: slot inspector right rail ---------- */
  main.with-inspector { grid-template-columns: 260px 1fr 260px; }
  aside.inspector { background: var(--panel); border-left: 1px solid var(--line);
    overflow-y: auto; padding: 14px 12px; display: none; }
  main.with-inspector aside.inspector { display: block; }
  aside.inspector h2 { margin: 0 0 10px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--ink-dim); }
  aside.inspector .empty-inspector { color: var(--ink-dim); font-size: 12px;
    padding: 10px 4px; line-height: 1.5; }
  .inspector-row { display: grid; grid-template-columns: 70px 1fr;
    align-items: center; gap: 8px; margin-bottom: 8px; }
  .inspector-row label { font-size: 11px; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.06em; }
  .inspector-row input[type=text], .inspector-row input[type=number],
  .inspector-row select {
    background: var(--panel-elev); color: var(--ink); border: 1px solid var(--line);
    border-radius: 4px; padding: 5px 7px; font: inherit; width: 100%;
    font-family: ui-monospace, "SF Mono", monospace; font-size: 12px; }
  .inspector-row input:focus, .inspector-row select:focus {
    outline: none; border-color: var(--accent); }
  .inspector-row .checkrow { display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-dim); }
  .inspector-section { border-top: 1px solid var(--line); margin-top: 14px;
    padding-top: 14px; }
  .inspector-section .danger { background: transparent; border-color: rgba(224,98,92,0.4);
    color: #f4a39e; width: 100%; padding: 7px; font-size: 12px; }
  .inspector-section .danger:hover { background: rgba(224, 98, 92, 0.1); }

  /* ---------- HOM-111: Modules view (HOM-117 polish) ---------- */
  /* Flex column so the action header stays put and the list scrolls
     internally — the previous `height: 100%` didn't subtract the page
     header, so the bottom of the section sat in the body's clipped
     region and the "+ Add module" button at the bottom of the list
     could be touch-scrolled past but never reached (HOM-117 bug). */
  section.modules-view {
    display: none;
    flex-direction: column;
    background: var(--bg);
    height: 100%;
    overflow: hidden;
  }
  body.view-modules main { display: none; }
  body.view-modules section.modules-view { display: flex; }

  .modules-view .view-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 18px;
    padding: 20px 28px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .modules-view .view-header h1 {
    margin: 0; font-size: 18px; letter-spacing: 0.01em;
  }
  .modules-view .view-header h1 .count {
    margin-left: 10px; color: var(--ink-dim); font-weight: 400; font-size: 13px;
  }
  .modules-view .view-header .hint {
    margin: 4px 0 0; font-size: 12px; color: var(--ink-dim); max-width: 44ch;
  }
  .modules-view .view-header .primary { padding: 9px 18px; }

  .modules-scroll {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 18px 28px 48px;
  }

  .modules-view .module-row {
    display: grid;
    grid-template-columns: 1fr 240px auto;
    align-items: center;
    gap: 16px;
    padding: 13px 16px;
    border-radius: 8px;
    background: var(--panel);
    margin-bottom: 6px;
    border: 1px solid transparent;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .modules-view .module-row:hover {
    border-color: var(--line); background: var(--panel-elev);
  }
  .modules-view .module-row .name {
    display: flex; align-items: center; gap: 10px;
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 13px; color: var(--ink);
  }
  .modules-view .module-row .name::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--success); flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(95, 184, 120, 0.12);
  }
  .modules-view .module-row.unplaced .name { color: var(--ink-dim); }
  .modules-view .module-row.unplaced .name::before {
    background: var(--ink-dim); box-shadow: none; opacity: 0.5;
  }
  .modules-view .module-row .placed {
    font-size: 11px; color: var(--ink-dim);
    display: flex; flex-direction: column; gap: 2px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .modules-view .module-row .placed .pages {
    font-family: ui-monospace, monospace; font-size: 12px;
    color: var(--ink); text-transform: none; letter-spacing: 0;
  }
  .modules-view .module-row .row-actions { display: flex; gap: 6px; }
  .modules-view .module-row button.subtle { font-size: 12px; padding: 6px 12px; }

  /* Empty state: invite the primary action without depending on the
     sticky header (the empty page should still feel directed). */
  .modules-view .empty-state {
    margin: 32px auto;
    max-width: 380px; text-align: center;
    padding: 32px 28px;
    border: 1px dashed var(--line); border-radius: 12px;
    color: var(--ink-dim);
    background: linear-gradient(180deg, var(--panel) 0%, transparent 100%);
  }
  .modules-view .empty-state h3 {
    margin: 0 0 6px; color: var(--ink); font-size: 15px; font-weight: 600;
  }
  .modules-view .empty-state p {
    margin: 0 0 18px; line-height: 1.5;
  }
  .modules-view .empty-state button.primary { padding: 9px 22px; }

  .module-edit-pane {
    background: var(--panel); padding: 18px 18px 0;
    border-radius: 10px; border: 1px solid var(--line);
    margin-top: 24px; position: relative;
  }
  .module-edit-pane h3 {
    margin: 0 0 14px; font-size: 11px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .module-edit-pane .field { margin-bottom: 14px; }
  .module-edit-pane label {
    display: block; font-size: 11px; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
  }
  .module-edit-pane input[type=text] {
    width: 100%; background: var(--panel-elev); color: var(--ink);
    border: 1px solid var(--line); border-radius: 5px; padding: 8px 10px;
    font: inherit; font-family: ui-monospace, monospace; font-size: 12px;
  }
  .module-edit-pane input[type=text]:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .module-edit-pane textarea {
    width: 100%; min-height: 180px; resize: vertical;
    background: #0a0d12; color: var(--ink);
    border: 1px solid var(--line); border-radius: 5px; padding: 10px;
    font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.5;
  }
  .module-edit-pane textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  /* Sticky action bar inside the pane so Save/Cancel are always one
     click away even when the JSON textarea grows. */
  .module-edit-pane .actions {
    display: flex; gap: 8px;
    position: sticky; bottom: 0;
    margin: 16px -18px 0; padding: 12px 18px;
    background: var(--panel);
    border-top: 1px solid var(--line);
    border-radius: 0 0 10px 10px;
  }
  .module-edit-pane .actions .spacer { flex: 1; }

  /* HOM-111: "+ Custom" entry in module rail */
  .module-card.custom { background: transparent;
    border: 1px dashed var(--line); color: var(--ink-dim); }
  .module-card.custom:hover { border-color: var(--accent); color: var(--accent); }

  /* ---------- HOM-119: sections ---------- */
  /* Section slots in PAGE context are dashed so the user can tell at a
     glance which slots are shared. Overridden slots get the solid accent
     border + ✱ badge because the geometry belongs to the page now. */
  .slot.section { border-style: dashed;
    background: rgba(180, 200, 240, 0.06); color: #aac0e8; }
  .slot.section.selected { border-color: #aac0e8;
    background: rgba(180, 200, 240, 0.14); box-shadow: 0 0 0 1px #aac0e8; }
  .slot .badge { position: absolute; top: 4px; right: 6px; font-size: 11px;
    color: var(--accent); pointer-events: none; }
  /* Sidebar accordion in Layout view: per-page section checkboxes */
  .sections-rail { margin-top: 18px; }
  .sections-rail h2 { margin-bottom: 8px; }
  .section-row { display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; margin-bottom: 3px; border-radius: 5px;
    background: var(--panel-elev); font-size: 12px;
    font-family: ui-monospace, "SF Mono", monospace; }
  .section-row input[type=checkbox] { accent-color: var(--accent); }
  .section-row .name { flex: 1; }
  .section-row .default-on { font-size: 10px; color: var(--accent);
    opacity: 0.8; }
  /* Sections-view sidebar list */
  .section-card { display: flex; flex-direction: column; gap: 4px;
    padding: 10px; margin-bottom: 4px; border-radius: 5px;
    background: var(--panel-elev); cursor: pointer;
    border: 1px solid transparent; }
  .section-card:hover { border-color: var(--line); }
  .section-card.active { border-color: var(--accent);
    background: var(--accent-dim); }
  .section-card .name { font-family: ui-monospace, monospace; font-size: 12px;
    color: var(--ink); }
  .section-card.active .name { color: var(--accent); }
  .section-card .meta { font-size: 10px; color: var(--ink-dim); }
  /* Inspector banner indicating section/override status */
  .inspector-banner { font-size: 11px; color: var(--ink-dim);
    background: var(--panel-elev); border: 1px solid var(--line);
    padding: 8px 10px; border-radius: 4px; margin-bottom: 12px;
    line-height: 1.4; }
  .inspector-banner b { color: var(--ink); }
  .inspector-banner.override { border-color: var(--accent);
    color: var(--accent); background: var(--accent-dim); }
  .inspector-section .accent { width: 100%; padding: 7px; font-size: 12px;
    background: transparent; color: var(--accent);
    border-color: var(--accent-dim); }
  .inspector-section .accent:hover { background: var(--accent-dim); }
  /* Section settings card in Sections view inspector */
  .section-settings { margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--line); }
  .section-settings label.toggle-row { display: flex; align-items: center;
    gap: 8px; font-size: 12px; color: var(--ink-dim); margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <div class="title">Canvas&nbsp;<span class="v2">v2</span></div>
  <div class="view-pill">
    <button id="view-layout" class="active">Layout</button>
    <button id="view-sections">Sections</button>
    <button id="view-modules">Modules</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <button class="subtle" id="new-page">+ Page</button>
  <label class="canvas-size" title="Canvas dimensions in physical pixels. Set this to your mirror's screen resolution (portrait Pi: 1080 × 1920) so slot coordinates map 1:1 to the screen.">
    <input type="number" id="canvas-w" min="120" step="20" />
    <span class="x">×</span>
    <input type="number" id="canvas-h" min="120" step="20" />
  </label>
  <button class="toggle" id="debug-toggle" title="Toggle debug borders + labels on the mirror">◑</button>
  <span class="save-status" id="save-status">Loaded</span>
  <button class="primary" id="save" disabled>Save</button>
</header>

<div class="overlap-banner" id="overlap-banner">
  <span id="overlap-msg"></span>
  <button class="subtle" id="overlap-resolve">Auto-resolve</button>
</div>

<main id="layout-view">
  <aside class="modules">
    <h2 id="rail-header">Modules</h2>
    <div id="modules"></div>
    <div class="sections-rail" id="sections-rail">
      <h2>Sections</h2>
      <div id="sections-list"></div>
    </div>
  </aside>
  <section class="viewport" id="viewport">
    <div class="canvas" id="canvas">
      <div class="empty-canvas-note" id="empty-note">
        Click a module on the left to place a slot.
      </div>
    </div>
  </section>
  <aside class="inspector" id="inspector">
    <h2>Inspector</h2>
    <div id="inspector-body"></div>
  </aside>
</main>

<section class="modules-view" id="modules-view">
  <header class="view-header">
    <div>
      <h1>Modules <span class="count" id="modules-count"></span></h1>
      <p class="hint">Anything you place on a page must be registered here first.</p>
    </div>
    <button class="primary" id="add-module-btn">+ Add module</button>
  </header>
  <div class="modules-scroll">
    <div id="modules-list"></div>
    <div id="module-edit"></div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
"use strict";

// ---------- state ----------
// HOM-119: selectedSlot is no longer an int index. With sections in
// play, the editor can select page slots, section defaults (in the
// Sections view), shared section slots in page context (read-only by
// default; drag edits the section default), or per-page overrides.
// `kind` distinguishes them so drag/inspector/commit code knows which
// backing array to mutate:
//   { kind: "page", index }
//   { kind: "sectionDefault", index }
//   { kind: "section", section, module }     // a section slot rendered on a page, not overridden
//   { kind: "override", section, module }    // page-specific override of a section slot
const state = {
  doc: null,              // { schemaVersion, canvas, sections, pages }
  modules: [],            // [{ id, module, config? }]
  pagesTf: null,          // { path, exists }
  activePage: "home",
  activeSection: null,    // active section when state.view === "sections"
  selectedSlot: null,     // see selector shape above; null = nothing selected
  dirty: false,
  scale: 1,
  view: "layout",         // "layout" | "sections" | "modules"
  editingModuleId: null,  // module id being edited in the Modules view; null = add
};

const SNAP_PX = 20;           // grid snap in canvas pixels

const $ = (id) => document.getElementById(id);

// ---------- fetch ----------
async function loadState() {
  const res = await fetch("/canvas/api/state");
  if (!res.ok) {
    toast("err", "failed to load state: " + res.status);
    return;
  }
  const data = await res.json();
  state.doc = data.document;
  state.modules = data.modules || [];
  state.pagesTf = data.pagesTf;
  if (!state.doc.pages) state.doc.pages = {};
  if (!state.doc.sections) state.doc.sections = {};
  if (!state.doc.canvas) state.doc.canvas = { width: 1080, height: 1920, defaultPage: "home" };
  // Pick a default active page: existing pages → first; otherwise canvas.defaultPage.
  const pageNames = Object.keys(state.doc.pages);
  state.activePage = pageNames.length
    ? (pageNames.includes(state.doc.canvas.defaultPage) ? state.doc.canvas.defaultPage : pageNames[0])
    : state.doc.canvas.defaultPage || "home";
  if (!state.doc.pages[state.activePage]) {
    state.doc.pages[state.activePage] = { slots: [] };
  }
  // Default active section: first section if any exist.
  const sectionNames = Object.keys(state.doc.sections);
  state.activeSection = sectionNames.length ? sectionNames.sort()[0] : null;
  state.dirty = false;
  renderAll();
}

// ---------- HOM-119: small helpers ----------
function ensurePageDefaults(page) {
  if (!page.slots) page.slots = [];
  if (!page.sections) page.sections = [];
  if (!page.sectionOverrides) page.sectionOverrides = [];
  return page;
}

function findOverride(page, section, module) {
  return (page.sectionOverrides || []).find(o =>
    o.section === section && o.module === module);
}

// resolveBackingSlot returns the actual mutable slot object behind a
// selectedSlot descriptor — drag/resize/inspector all mutate via this so
// the dispatch logic stays in one place. Returns null for selectors
// pointing at a slot that no longer exists (e.g., section deleted).
function resolveBackingSlot(sel) {
  if (!sel) return null;
  if (sel.kind === "page") {
    const page = state.doc.pages[state.activePage];
    return page && page.slots ? (page.slots[sel.index] || null) : null;
  }
  if (sel.kind === "sectionDefault") {
    const section = state.doc.sections[state.activeSection];
    return section && section.slots ? (section.slots[sel.index] || null) : null;
  }
  if (sel.kind === "section") {
    // Editing a section slot from page context edits the section default
    // (user-specified semantics: "edits apply to the default positioning
    // but overrides should not be effected by default changing"). The
    // override flow is separate — see addOverride().
    const section = state.doc.sections[sel.section];
    if (!section) return null;
    return (section.slots || []).find(s => s.module === sel.module) || null;
  }
  if (sel.kind === "override") {
    const page = state.doc.pages[state.activePage];
    if (!page) return null;
    return findOverride(page, sel.section, sel.module) || null;
  }
  return null;
}

// activeEntries returns the renderable slot entries for the current
// view. Each entry carries the slot (read-only view; mutations go via
// resolveBackingSlot) and a selector identifying it. In Layout view the
// page's included section slots come first (so page-specific slots
// overlay them by default CSS source order); in Sections view it's just
// the active section's slots. Overlap / inspector logic walks this list.
function activeEntries() {
  if (state.view === "sections") {
    if (!state.activeSection) return [];
    const section = state.doc.sections[state.activeSection];
    if (!section || !section.slots) return [];
    return section.slots.map((slot, index) => ({
      slot, sel: { kind: "sectionDefault", index },
    }));
  }
  const page = state.doc.pages[state.activePage];
  if (!page) return [];
  ensurePageDefaults(page);
  const out = [];
  for (const sectionName of page.sections) {
    const section = state.doc.sections[sectionName];
    if (!section || !section.slots) continue;
    for (const slot of section.slots) {
      const override = findOverride(page, sectionName, slot.module);
      if (override) {
        out.push({
          slot: { module: slot.module, x: override.x, y: override.y,
            w: override.w, h: override.h, zIndex: override.zIndex || 0,
            hidden: !!override.hidden },
          sel: { kind: "override", section: sectionName, module: slot.module },
        });
      } else {
        out.push({
          slot,
          sel: { kind: "section", section: sectionName, module: slot.module },
        });
      }
    }
  }
  page.slots.forEach((slot, index) => {
    out.push({ slot, sel: { kind: "page", index } });
  });
  return out;
}

function selectorsEqual(a, b) {
  if (!a || !b) return false;
  if (a.kind !== b.kind) return false;
  if (a.kind === "page" || a.kind === "sectionDefault") return a.index === b.index;
  return a.section === b.section && a.module === b.module;
}

// ---------- render ----------
function renderAll() {
  renderView();
  renderTabs();
  renderCanvasSize();
  renderModules();
  renderSectionsRail();
  renderCanvas();
  renderInspector();
  renderOverlapBanner();
  renderDebugToggle();
  renderSaveStatus();
}

// HOM-120: header width/height inputs reflect the layout's logical
// canvas dimensions. Edits commit on blur/Enter so a half-typed number
// (e.g. "1" while typing "1080") doesn't reflow the canvas yet.
function renderCanvasSize() {
  const w = $("canvas-w"), h = $("canvas-h");
  // Don't clobber the active input — would lose the user's caret while
  // they're mid-edit.
  if (document.activeElement !== w) w.value = state.doc.canvas.width;
  if (document.activeElement !== h) h.value = state.doc.canvas.height;
}

function commitCanvasSize(field, raw) {
  const val = parseInt(raw, 10);
  if (!Number.isFinite(val) || val <= 0) return;
  // Reject sizes that would put existing slots out of bounds. The agent
  // will reject these on Save anyway; catching client-side gives a
  // friendlier toast and keeps the editor's preview consistent.
  for (const [pageName, page] of Object.entries(state.doc.pages || {})) {
    for (const slot of (page.slots || [])) {
      if (field === "width" && slot.x + slot.w > val) {
        toast("err", `slot "${slot.module}" on page "${pageName}" extends past width ${val}`);
        renderCanvasSize();
        return;
      }
      if (field === "height" && slot.y + slot.h > val) {
        toast("err", `slot "${slot.module}" on page "${pageName}" extends past height ${val}`);
        renderCanvasSize();
        return;
      }
    }
  }
  if (state.doc.canvas[field] === val) return;
  state.doc.canvas[field] = val;
  markDirty();
  renderCanvas();
}

function renderView() {
  $("view-layout").classList.toggle("active", state.view === "layout");
  $("view-sections").classList.toggle("active", state.view === "sections");
  $("view-modules").classList.toggle("active", state.view === "modules");
  document.body.classList.toggle("view-modules", state.view === "modules");
  // HOM-119: the Layout view and Sections view share the same DOM
  // shell (sidebar / canvas / inspector). renderTabs / renderCanvas /
  // renderSectionsRail switch their contents based on state.view.
  // The "+ Page" button is re-labelled to "+ Section" in sections view.
  $("new-page").textContent = state.view === "sections" ? "+ Section" : "+ Page";
  $("rail-header").textContent = state.view === "sections" ? "Add slot" : "Modules";
  if (state.view === "modules") renderModulesView();
}

function renderTabs() {
  const root = $("tabs");
  root.innerHTML = "";
  if (state.view === "modules") return;
  const isSections = state.view === "sections";
  const names = isSections
    ? Object.keys(state.doc.sections || {}).sort()
    : Object.keys(state.doc.pages).sort();
  const active = isSections ? state.activeSection : state.activePage;
  for (const name of names) {
    const el = document.createElement("div");
    el.className = "tab" + (name === active ? " active" : "");
    el.textContent = name;
    el.onclick = () => isSections ? switchSection(name) : switchPage(name);
    if (name === active) {
      const x = document.createElement("span");
      x.className = "x"; x.textContent = "×";
      x.onclick = (e) => {
        e.stopPropagation();
        if (isSections) deleteSection(name);
        else if (names.length > 1) deletePage(name);
        else toast("err", "can't delete the only page");
      };
      el.appendChild(x);
    }
    root.appendChild(el);
  }
}

function renderModules() {
  const root = $("modules");
  root.innerHTML = "";
  if (state.modules.length === 0) {
    root.innerHTML = '<div style="color:var(--ink-dim);font-size:12px">No modules registered yet. Add them via your modules.tf, then refresh.</div>';
    return;
  }
  // Placement summary: where a module is currently used. In Layout view
  // we track pages; in Sections view, sections. Helps the author avoid
  // double-placing (which the validators reject).
  const placement = {};
  if (state.view === "sections") {
    for (const [sectionName, section] of Object.entries(state.doc.sections || {})) {
      for (const slot of (section.slots || [])) {
        (placement[slot.module] = placement[slot.module] || new Set()).add(sectionName);
      }
    }
  } else {
    for (const [pageName, page] of Object.entries(state.doc.pages)) {
      for (const slot of (page.slots || [])) {
        (placement[slot.module] = placement[slot.module] || new Set()).add(pageName);
      }
    }
  }
  const sorted = state.modules.slice().sort((a, b) => a.module.localeCompare(b.module));
  for (const m of sorted) {
    const placedIn = placement[m.module];
    const card = document.createElement("div");
    card.className = "module-card" + (placedIn ? " placed" : "");
    card.title = state.view === "sections"
      ? "Click to add this module to the current section"
      : "Click to add this module to the current page";
    const name = document.createElement("span");
    name.className = "name"; name.textContent = m.module;
    card.appendChild(name);
    if (placedIn) {
      const inLabel = document.createElement("span");
      inLabel.className = "pages";
      inLabel.textContent = "in " + Array.from(placedIn).sort().join(", ");
      card.appendChild(inLabel);
    }
    card.onclick = () => addSlot(m.module);
    root.appendChild(card);
  }

  // HOM-111: quick-add for an unregistered module.
  const custom = document.createElement("div");
  custom.className = "module-card custom";
  custom.textContent = "+ Custom module…";
  custom.title = "Add a slot for a module that isn't registered yet";
  custom.onclick = quickAddCustom;
  root.appendChild(custom);
}

// HOM-119: the sections rail switches duty by view.
// - layout: per-page checkboxes (toggle inclusion of each section)
// - sections: cards listing sections, click to switch active
// - modules: hidden (sidebar isn't even shown by parent layout)
function renderSectionsRail() {
  const rail = $("sections-rail");
  const list = $("sections-list");
  list.innerHTML = "";
  const sectionNames = Object.keys(state.doc.sections || {}).sort();
  if (state.view === "modules") {
    rail.style.display = "none";
    return;
  }
  rail.style.display = "";
  rail.querySelector("h2").textContent = state.view === "sections" ? "Sections" : "Page sections";
  if (sectionNames.length === 0) {
    const hint = document.createElement("div");
    hint.style.cssText = "color:var(--ink-dim);font-size:11px;padding:4px 2px;line-height:1.4;";
    hint.textContent = state.view === "sections"
      ? "No sections yet. Click + Section above to create a reusable group of slots."
      : "No sections yet. Use the Sections view to author shared slot groups.";
    list.appendChild(hint);
    return;
  }
  if (state.view === "sections") {
    for (const name of sectionNames) {
      const card = document.createElement("div");
      card.className = "section-card" + (name === state.activeSection ? " active" : "");
      const nm = document.createElement("div");
      nm.className = "name"; nm.textContent = name;
      card.appendChild(nm);
      const section = state.doc.sections[name];
      const meta = document.createElement("div");
      meta.className = "meta";
      const slotCount = (section.slots || []).length;
      const tags = [];
      tags.push(slotCount + " slot" + (slotCount === 1 ? "" : "s"));
      if (section.defaultOnNewPage) tags.push("default on new pages");
      meta.textContent = tags.join(" · ");
      card.appendChild(meta);
      card.onclick = () => switchSection(name);
      list.appendChild(card);
    }
    return;
  }
  // Layout view: checkboxes for per-page section inclusion.
  const page = state.doc.pages[state.activePage];
  if (!page) return;
  ensurePageDefaults(page);
  for (const name of sectionNames) {
    const row = document.createElement("div");
    row.className = "section-row";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = page.sections.includes(name);
    cb.onchange = () => toggleSectionInclusion(name, cb.checked);
    row.appendChild(cb);
    const nm = document.createElement("span");
    nm.className = "name"; nm.textContent = name;
    row.appendChild(nm);
    if (state.doc.sections[name].defaultOnNewPage) {
      const flag = document.createElement("span");
      flag.className = "default-on"; flag.textContent = "auto";
      flag.title = "Auto-included when a new page is created";
      row.appendChild(flag);
    }
    list.appendChild(row);
  }
}

function renderCanvas() {
  const canvas = $("canvas");
  const viewport = $("viewport");
  const { width, height } = state.doc.canvas;
  // Pick a scale that fits in the viewport with 24px padding margin.
  const vw = viewport.clientWidth - 48;
  const vh = viewport.clientHeight - 48;
  state.scale = Math.min(vw / width, vh / height);
  canvas.style.width = (width * state.scale) + "px";
  canvas.style.height = (height * state.scale) + "px";
  canvas.style.setProperty("--grid-px", (SNAP_PX * state.scale) + "px");

  // Wipe and re-render all slots.
  Array.from(canvas.querySelectorAll(".slot")).forEach(n => n.remove());
  const entries = activeEntries();
  const emptyNote = $("empty-note");
  if (entries.length === 0) {
    emptyNote.style.display = "block";
    emptyNote.textContent = state.view === "sections"
      ? (state.activeSection
        ? "Click a module on the left to add it to this section."
        : "Click + Section above to create your first reusable section.")
      : "Click a module on the left to place a slot.";
  } else {
    emptyNote.style.display = "none";
  }
  const overlapSet = computeOverlappingEntries(entries);
  entries.forEach((entry, i) => {
    canvas.appendChild(buildSlotEl(entry, overlapSet.has(i)));
  });
}

function buildSlotEl(entry, isOverlapping) {
  const { slot, sel } = entry;
  const el = document.createElement("div");
  const selected = selectorsEqual(state.selectedSlot, sel);
  el.className = "slot"
    + (sel.kind === "section" ? " section" : "")
    + (selected ? " selected" : "")
    + (isOverlapping ? " overlap" : "");
  el.style.left = (slot.x * state.scale) + "px";
  el.style.top = (slot.y * state.scale) + "px";
  el.style.width = (slot.w * state.scale) + "px";
  el.style.height = (slot.h * state.scale) + "px";
  el.dataset.kind = sel.kind;

  const info = document.createElement("div");
  info.className = "info";
  let prefix = "";
  if (sel.kind === "section") prefix = "§ ";
  if (sel.kind === "override") prefix = "✱ ";
  if (sel.kind === "sectionDefault") prefix = "§ ";
  info.textContent = prefix + slot.module + "  " + slot.w + "×" + slot.h;
  el.appendChild(info);

  // Override badge in page context — instantly readable signal that
  // this page has its own copy of the section's slot.
  if (sel.kind === "override") {
    const badge = document.createElement("div");
    badge.className = "badge"; badge.textContent = "✱";
    badge.title = "Page-specific override of " + sel.section + "/" + sel.module;
    el.appendChild(badge);
  }

  el.onmousedown = (e) => beginDrag(e, sel);
  if (selected) {
    ["nw","ne","sw","se"].forEach(corner => {
      const h = document.createElement("div");
      h.className = "handle " + corner;
      h.onmousedown = (e) => { e.stopPropagation(); beginResize(e, sel, corner); };
      el.appendChild(h);
    });
  }
  return el;
}

function renderSaveStatus() {
  const el = $("save-status");
  if (state.dirty) {
    el.textContent = "unsaved";
    el.className = "save-status dirty";
    $("save").disabled = false;
  } else {
    if (el.className.includes("ok") || el.className.includes("err")) return; // keep toast state briefly
    el.textContent = "saved";
    el.className = "save-status";
    $("save").disabled = true;
  }
}

// ---------- HOM-111 + HOM-119: inspector ----------
function renderInspector() {
  const main = $("layout-view");
  const body = $("inspector-body");
  const slot = resolveBackingSlot(state.selectedSlot);
  const sel = state.selectedSlot;

  // In Modules view there's no canvas inspector — short-circuit.
  if (state.view === "modules") { main.classList.remove("with-inspector"); return; }

  main.classList.toggle("with-inspector", !!slot || state.view === "sections");
  if (!slot) {
    if (state.view === "sections") {
      renderSectionSettingsInspector(body);
      return;
    }
    body.innerHTML = '<div class="empty-inspector">Click a slot in the canvas to edit its module, position, size, z-index, or hidden state.</div>';
    return;
  }

  body.innerHTML = "";

  // Banner explains context — especially important when the user is
  // editing a section default from page context (changes propagate to
  // every page that uses the section without an override).
  if (sel.kind === "section") {
    body.appendChild(inspectorBanner(
      "<b>Section default:</b> " + escapeHTML(sel.section) + "/" + escapeHTML(sel.module)
      + ". Edits here change every page that uses this section without an override."));
  } else if (sel.kind === "override") {
    body.appendChild(inspectorBanner(
      "<b>Page override:</b> " + escapeHTML(sel.section) + "/" + escapeHTML(sel.module)
      + ". Section default changes won't affect this page until you drop the override.",
      "override"));
  } else if (sel.kind === "sectionDefault") {
    body.appendChild(inspectorBanner(
      "<b>Section slot</b> in <b>" + escapeHTML(state.activeSection) + "</b>. "
      + "Pages that include this section render this slot at this geometry by default."));
  }

  const rows = [];
  // Module is editable only in mutable page-slot / section-default
  // contexts. Section + override slots derive the module from the
  // section definition, so changing it would orphan the override.
  if (sel.kind === "page" || sel.kind === "sectionDefault") {
    rows.push(inspectorSelectRow("Module", "module", slot.module, true));
  } else {
    rows.push(inspectorTextRow("Module", slot.module));
  }
  rows.push(inspectorIntRow("X", "x", slot.x));
  rows.push(inspectorIntRow("Y", "y", slot.y));
  rows.push(inspectorIntRow("W", "w", slot.w));
  rows.push(inspectorIntRow("H", "h", slot.h));
  rows.push(inspectorIntRow("Z", "zIndex", slot.zIndex || 0, { min: -100, max: 100, step: 1 }));
  rows.push(inspectorCheckRow("Hidden", "hidden", !!slot.hidden));
  rows.forEach(r => body.appendChild(r));

  // Action section — varies by selection kind. HOM-119 override controls.
  const actions = document.createElement("div");
  actions.className = "inspector-section";
  if (sel.kind === "section") {
    const overrideBtn = document.createElement("button");
    overrideBtn.className = "accent";
    overrideBtn.textContent = "Override on this page";
    overrideBtn.title = "Snapshot the current geometry as a page-specific override. Future section default changes won't affect this page.";
    overrideBtn.onclick = () => createOverride(sel.section, sel.module);
    actions.appendChild(overrideBtn);
  } else if (sel.kind === "override") {
    const dropBtn = document.createElement("button");
    dropBtn.className = "accent";
    dropBtn.textContent = "Drop override";
    dropBtn.title = "Revert this page to using the section's default geometry.";
    dropBtn.onclick = () => dropOverride(sel.section, sel.module);
    actions.appendChild(dropBtn);
  } else {
    const removeBtn = document.createElement("button");
    removeBtn.className = "danger";
    removeBtn.textContent = sel.kind === "sectionDefault"
      ? "Remove slot from section"
      : "Remove slot from page";
    removeBtn.onclick = deleteSelectedSlot;
    actions.appendChild(removeBtn);
  }
  body.appendChild(actions);
}

function inspectorBanner(html, variant) {
  const div = document.createElement("div");
  div.className = "inspector-banner" + (variant ? " " + variant : "");
  div.innerHTML = html;
  return div;
}

function inspectorTextRow(label, value) {
  const row = inspectorRow(label);
  const input = document.createElement("input");
  input.type = "text"; input.value = value; input.disabled = true;
  row.appendChild(input);
  return row;
}

// HOM-119: when there's no slot selected in Sections view, the inspector
// shows section-level controls (name, default-on-new-page toggle,
// delete). Kept here rather than embedded in the sidebar so the
// inspector stays the single source of "the thing you're editing."
function renderSectionSettingsInspector(body) {
  body.innerHTML = "";
  if (!state.activeSection) {
    body.innerHTML = '<div class="empty-inspector">No section selected. Click + Section in the toolbar to create one, or pick an existing section from the tabs.</div>';
    return;
  }
  const section = state.doc.sections[state.activeSection];
  if (!section) { body.innerHTML = ""; return; }

  const banner = inspectorBanner(
    "Editing section <b>" + escapeHTML(state.activeSection) + "</b>. "
    + "Add slots from the left rail; pages opt in via the Sections checkboxes in Layout view.");
  body.appendChild(banner);

  const settings = document.createElement("div");
  settings.className = "section-settings";

  const onLabel = document.createElement("label");
  onLabel.className = "toggle-row";
  const cb = document.createElement("input");
  cb.type = "checkbox"; cb.checked = !!section.defaultOnNewPage;
  cb.onchange = () => {
    section.defaultOnNewPage = cb.checked;
    markDirty();
    renderSectionsRail();
  };
  onLabel.appendChild(cb);
  const txt = document.createElement("span");
  txt.textContent = "Include in new pages by default";
  onLabel.appendChild(txt);
  settings.appendChild(onLabel);

  const delBtn = document.createElement("button");
  delBtn.className = "danger";
  delBtn.style.cssText = "width:100%;padding:7px;font-size:12px;background:transparent;border-color:rgba(224,98,92,0.4);color:#f4a39e;";
  delBtn.textContent = "Delete section";
  delBtn.onclick = () => deleteSection(state.activeSection);
  settings.appendChild(delBtn);

  body.appendChild(settings);
}

function escapeHTML(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function inspectorRow(label) {
  const row = document.createElement("div");
  row.className = "inspector-row";
  const l = document.createElement("label");
  l.textContent = label;
  row.appendChild(l);
  return row;
}

function inspectorIntRow(label, field, value, opts) {
  const row = inspectorRow(label);
  const input = document.createElement("input");
  input.type = "number";
  input.value = value;
  input.step = (opts && opts.step) || SNAP_PX;
  if (opts && opts.min != null) input.min = opts.min;
  input.oninput = () => commitSlotField(field, parseInt(input.value, 10) || 0);
  row.appendChild(input);
  return row;
}

function inspectorSelectRow(label, field, value, allowCustom) {
  const row = inspectorRow(label);
  const select = document.createElement("select");
  const seen = new Set();
  state.modules.forEach((m) => {
    if (seen.has(m.module)) return;
    seen.add(m.module);
    const opt = document.createElement("option");
    opt.value = m.module; opt.textContent = m.module;
    select.appendChild(opt);
  });
  if (!seen.has(value) && allowCustom) {
    // Module not in registry — show it as the current value so the
    // user can keep using the slot, and label it.
    const opt = document.createElement("option");
    opt.value = value;
    opt.textContent = value + "  (unregistered)";
    select.appendChild(opt);
  }
  select.value = value;
  select.onchange = () => commitSlotField(field, select.value);
  row.appendChild(select);
  return row;
}

function inspectorCheckRow(label, field, value) {
  const row = inspectorRow(label);
  const wrap = document.createElement("div");
  wrap.className = "checkrow";
  const cb = document.createElement("input");
  cb.type = "checkbox"; cb.checked = value;
  cb.onchange = () => commitSlotField(field, cb.checked);
  wrap.appendChild(cb);
  const note = document.createElement("span");
  note.textContent = value ? "slot reserves space, won't render" : "rendered";
  wrap.appendChild(note);
  row.appendChild(wrap);
  return row;
}

function commitSlotField(field, value) {
  const slot = resolveBackingSlot(state.selectedSlot);
  if (!slot) return;
  // Bounds-check geometry fields against the canvas.
  if (field === "x") value = clamp(value, 0, state.doc.canvas.width - slot.w);
  if (field === "y") value = clamp(value, 0, state.doc.canvas.height - slot.h);
  if (field === "w") value = clamp(Math.max(SNAP_PX, value), SNAP_PX, state.doc.canvas.width - slot.x);
  if (field === "h") value = clamp(Math.max(SNAP_PX, value), SNAP_PX, state.doc.canvas.height - slot.y);
  slot[field] = value;
  markDirty();
  // Light render to update slot rect + overlap viz; full render bounces focus.
  renderCanvas();
  renderOverlapBanner();
}

// ---------- HOM-111 + HOM-119: overlap detection ----------
// computeOverlappingEntries works on the entry array (which already
// merges page + section + override slots), so the overlap UI reflects
// what the agent will validate at Save time.
function computeOverlappingEntries(entries) {
  const out = new Set();
  for (let i = 0; i < entries.length; i++) {
    const a = entries[i].slot;
    if (a.hidden) continue;
    for (let j = i + 1; j < entries.length; j++) {
      const b = entries[j].slot;
      if (b.hidden) continue;
      if (rectsOverlap(a, b)) {
        out.add(i); out.add(j);
      }
    }
  }
  return out;
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && b.x < a.x + a.w
    && a.y < b.y + b.h && b.y < a.y + a.h;
}

function renderOverlapBanner() {
  const entries = activeEntries();
  const overlapping = computeOverlappingEntries(entries);
  const banner = $("overlap-banner");
  if (overlapping.size === 0) { banner.classList.remove("show"); return; }
  let pairs = 0;
  for (let i = 0; i < entries.length; i++) {
    if (entries[i].slot.hidden) continue;
    for (let j = i + 1; j < entries.length; j++) {
      if (entries[j].slot.hidden) continue;
      if (rectsOverlap(entries[i].slot, entries[j].slot)) pairs++;
    }
  }
  const scope = state.view === "sections" ? "section" : "page";
  $("overlap-msg").textContent = pairs + " overlapping slot pair" + (pairs === 1 ? "" : "s")
    + " on this " + scope + " — Save will be rejected by the agent until resolved.";
  banner.classList.add("show");
}

function autoResolveOverlaps() {
  // Auto-resolve only operates on the active list of MUTABLE slots in
  // the current view. In layout view that's the page's own slots; in
  // sections view, the active section's slots. Section/override slots
  // mixed with page slots are not auto-shrunk — those should be
  // resolved deliberately (drag the page slot away, or move the
  // section default).
  const list = (state.view === "sections")
    ? (state.doc.sections[state.activeSection] || {}).slots
    : (state.doc.pages[state.activePage] || {}).slots;
  if (!list) return;
  for (let i = 1; i < list.length; i++) {
    if (list[i].hidden) continue;
    let attempts = 0;
    while (attempts < 50) {
      let conflict = false;
      for (let j = 0; j < i; j++) {
        if (list[j].hidden) continue;
        if (rectsOverlap(list[i], list[j])) { conflict = true; break; }
      }
      if (!conflict) break;
      const s = list[i];
      if (s.w > SNAP_PX * 2) s.w -= SNAP_PX;
      else if (s.h > SNAP_PX * 2) s.h -= SNAP_PX;
      else break;
      attempts++;
    }
  }
  markDirty();
  renderAll();
}

// ---------- HOM-111: debug toggle ----------
function renderDebugToggle() {
  const btn = $("debug-toggle");
  const on = !!(state.doc && state.doc.canvas && state.doc.canvas.debugBorders);
  btn.classList.toggle("on", on);
  btn.title = on
    ? "Debug borders on — click to turn off"
    : "Click to turn on debug borders + labels (live on the mirror)";
}

async function toggleDebug() {
  const next = !(state.doc.canvas.debugBorders);
  state.doc.canvas.debugBorders = next;
  state.doc.canvas.debugLabels = next;
  renderDebugToggle();
  // Hit the dedicated endpoint so the change reaches the mirror
  // immediately via canvas-layout.json fs.watch — no full Save round
  // trip needed for a toggle.
  try {
    const res = await fetch("/canvas/api/debug-toggle", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ borders: next, labels: next }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "HTTP " + res.status }));
      toast("err", "debug toggle failed: " + (err.error || res.status));
      return;
    }
    toast("ok", "debug borders " + (next ? "on" : "off"));
  } catch (e) {
    toast("err", "network error: " + e.message);
  }
}

// ---------- HOM-111: Modules view (HOM-117 polish) ----------
function renderModulesView() {
  const list = $("modules-list");
  list.innerHTML = "";

  const placement = {};
  for (const [pageName, page] of Object.entries(state.doc.pages || {})) {
    for (const slot of (page.slots || [])) {
      (placement[slot.module] = placement[slot.module] || new Set()).add(pageName);
    }
  }
  const sorted = state.modules.slice().sort((a, b) => a.module.localeCompare(b.module));
  $("modules-count").textContent = sorted.length ? `· ${sorted.length}` : "";

  if (sorted.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.innerHTML = `
      <h3>No modules registered</h3>
      <p>Modules are the building blocks every page slot draws from. Add your first one — you can rename or remove it later.</p>
      <button class="primary" type="button">+ Add your first module</button>
    `;
    empty.querySelector("button").onclick = () => {
      state.editingModuleId = ""; renderModulesView();
    };
    list.appendChild(empty);
  }

  for (const m of sorted) {
    const placedPages = placement[m.module] ? Array.from(placement[m.module]).sort() : null;
    const isPlaced = !!placedPages;

    const row = document.createElement("div");
    row.className = "module-row" + (isPlaced ? "" : " unplaced");

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = m.module;
    row.appendChild(name);

    const placed = document.createElement("div");
    placed.className = "placed";
    placed.innerHTML = isPlaced
      ? `<span>Placed on</span><span class="pages">${placedPages.join(", ")}</span>`
      : `<span>Not placed</span>`;
    row.appendChild(placed);

    const actions = document.createElement("div");
    actions.className = "row-actions";
    const edit = document.createElement("button");
    edit.className = "subtle";
    edit.textContent = "Edit";
    edit.onclick = () => openModuleEditor(m.id);
    actions.appendChild(edit);
    const del = document.createElement("button");
    del.className = "subtle";
    del.textContent = "Delete";
    del.onclick = () => hardDeleteModule(m.id, m.module);
    actions.appendChild(del);
    row.appendChild(actions);

    list.appendChild(row);
  }

  renderModuleEditPane();
}

function renderModuleEditPane() {
  const pane = $("module-edit");
  pane.innerHTML = "";
  if (state.editingModuleId === null) return;

  const m = state.editingModuleId
    ? state.modules.find((x) => x.id === state.editingModuleId)
    : { module: "", config: {} };
  if (!m) { state.editingModuleId = null; return; }

  const box = document.createElement("div");
  box.className = "module-edit-pane";
  const h = document.createElement("h3");
  h.textContent = m.id ? "Edit " + m.module : "Add module";
  box.appendChild(h);

  const nameField = document.createElement("div");
  nameField.className = "field";
  nameField.innerHTML = '<label>Module name</label>';
  const nameInput = document.createElement("input");
  nameInput.type = "text";
  nameInput.placeholder = "e.g. MMM-Chores";
  nameInput.value = m.module || "";
  nameInput.disabled = !!m.id; // Can't rename existing — would orphan slots.
  nameField.appendChild(nameInput);
  box.appendChild(nameField);

  const cfgField = document.createElement("div");
  cfgField.className = "field";
  cfgField.innerHTML = '<label>Config (JSON)</label>';
  const cfgInput = document.createElement("textarea");
  cfgInput.spellcheck = false;
  cfgInput.value = JSON.stringify(m.config || {}, null, 2);
  cfgField.appendChild(cfgInput);
  box.appendChild(cfgField);

  const actions = document.createElement("div");
  actions.className = "actions";
  const cancel = document.createElement("button");
  cancel.textContent = "Cancel";
  cancel.onclick = () => { state.editingModuleId = null; renderModulesView(); };
  actions.appendChild(cancel);
  const spacer = document.createElement("div");
  spacer.className = "spacer";
  actions.appendChild(spacer);
  const save = document.createElement("button");
  save.className = "primary";
  save.textContent = m.id ? "Save changes" : "Add module";
  save.onclick = async () => {
    let cfg;
    try { cfg = JSON.parse(cfgInput.value || "{}"); }
    catch (e) { toast("err", "config JSON: " + e.message); return; }
    if (!nameInput.value.trim()) { toast("err", "module name is required"); return; }
    if (m.id) {
      await updateRegisteredModule(m.id, { module: nameInput.value.trim(), config: cfg, position: m.position, classes: m.classes });
    } else {
      await createRegisteredModule({ module: nameInput.value.trim(), config: cfg });
    }
  };
  actions.appendChild(save);
  box.appendChild(actions);

  pane.appendChild(box);

  // HOM-117: bring the pane into view and focus the obvious entry
  // point. For adds the name input; for edits the JSON textarea (since
  // the name is locked and the body of work is the config).
  requestAnimationFrame(() => {
    box.scrollIntoView({ behavior: "smooth", block: "center" });
    (m.id ? cfgInput : nameInput).focus();
  });
}

function openModuleEditor(id) {
  state.editingModuleId = id;
  renderModulesView();
}

async function createRegisteredModule(data) {
  try {
    const res = await fetch("/canvas/api/modules", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "HTTP " + res.status }));
      toast("err", err.error || "add failed");
      return;
    }
    const created = await res.json();
    state.modules.push({ id: created.id, module: created.module, config: created.config });
    state.editingModuleId = null;
    toast("ok", "module " + data.module + " registered");
    renderAll();
  } catch (e) {
    toast("err", "network error: " + e.message);
  }
}

async function updateRegisteredModule(id, data) {
  try {
    const res = await fetch("/canvas/api/modules/" + encodeURIComponent(id), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "HTTP " + res.status }));
      toast("err", err.error || "update failed");
      return;
    }
    const updated = await res.json();
    const idx = state.modules.findIndex((m) => m.id === id);
    if (idx !== -1) state.modules[idx] = { id: updated.id, module: updated.module, config: updated.config };
    state.editingModuleId = null;
    toast("ok", "saved");
    renderAll();
  } catch (e) {
    toast("err", "network error: " + e.message);
  }
}

async function hardDeleteModule(id, name) {
  const placedIn = [];
  for (const [p, page] of Object.entries(state.doc.pages || {})) {
    for (const slot of (page.slots || [])) {
      if (slot.module === name) { placedIn.push(p); break; }
    }
  }
  const warn = placedIn.length
    ? "\nThis module is currently placed in pages: " + placedIn.join(", ") + ". Their slots will silently fail to render until you remove them."
    : "";
  if (!confirm("Hard-delete module \"" + name + "\"? This removes it from the registry permanently." + warn)) return;
  try {
    const res = await fetch("/canvas/api/modules/" + encodeURIComponent(id), { method: "DELETE" });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "HTTP " + res.status }));
      toast("err", err.error || "delete failed");
      return;
    }
    state.modules = state.modules.filter((m) => m.id !== id);
    state.editingModuleId = null;
    toast("ok", "module deleted");
    renderAll();
  } catch (e) {
    toast("err", "network error: " + e.message);
  }
}

// ---------- HOM-111: quick add ----------
function quickAddCustom() {
  const name = prompt(
    "Module name (must match MM's wrapper class — e.g. \"clock\" for the\nbuilt-in clock, \"MMM-Chores\" for the third-party module):",
    "",
  );
  if (!name) return;
  const trimmed = name.trim();
  if (!trimmed) return;
  const known = state.modules.some((m) => m.module === trimmed);
  if (!known) {
    if (!confirm(`"${trimmed}" isn't a registered module yet — the slot will save fine but the canvas will warn "wrapper not found" until you register it in the Modules view.\n\nPlace the slot now?`)) return;
  }
  addSlot(trimmed);
}

// ---------- mutations ----------
function switchPage(name) {
  state.activePage = name;
  state.selectedSlot = null;
  renderAll();
}

function switchSection(name) {
  state.activeSection = name;
  state.selectedSlot = null;
  renderAll();
}

function addSlot(moduleName) {
  const { width, height } = state.doc.canvas;
  const w = 400, h = 200;
  const x = snap(Math.max(0, Math.floor((width - w) / 2)));
  const y = snap(Math.max(0, Math.floor((height - h) / 2)));
  const newSlot = { module: moduleName, x, y, w, h, zIndex: 0, hidden: false };
  if (state.view === "sections") {
    if (!state.activeSection) {
      toast("err", "no active section — create one with + Section first");
      return;
    }
    const section = state.doc.sections[state.activeSection];
    if (!section.slots) section.slots = [];
    // Section validator rejects duplicate modules (overrides identify by
    // module). Surface the conflict client-side with a friendlier toast.
    if (section.slots.some(s => s.module === moduleName)) {
      toast("err", "section already contains a slot for " + moduleName);
      return;
    }
    section.slots.push(newSlot);
    state.selectedSlot = { kind: "sectionDefault", index: section.slots.length - 1 };
  } else {
    const page = ensurePage(state.activePage);
    page.slots.push(newSlot);
    state.selectedSlot = { kind: "page", index: page.slots.length - 1 };
  }
  markDirty();
  renderAll();
}

function ensurePage(name) {
  if (!state.doc.pages[name]) {
    state.doc.pages[name] = { slots: [], sections: [], sectionOverrides: [] };
  }
  return ensurePageDefaults(state.doc.pages[name]);
}

// HOM-119: new pages auto-include any section with defaultOnNewPage.
// The user can still uncheck them via the Layout-view sidebar.
function defaultSectionsForNewPage() {
  return Object.entries(state.doc.sections || {})
    .filter(([, section]) => section.defaultOnNewPage)
    .map(([name]) => name);
}

function newPage() {
  if (state.view === "sections") { newSection(); return; }
  const name = prompt("Page name (lowercase, no spaces):", "page" + (Object.keys(state.doc.pages).length + 1));
  if (!name) return;
  if (state.doc.pages[name]) {
    toast("err", `page "${name}" already exists`);
    return;
  }
  state.doc.pages[name] = {
    slots: [],
    sections: defaultSectionsForNewPage(),
    sectionOverrides: [],
  };
  state.activePage = name;
  state.selectedSlot = null;
  markDirty();
  renderAll();
}

function newSection() {
  const name = prompt(
    "Section name (lowercase identifier — e.g. \"scene-strip\", \"mascot\"):",
    "section" + (Object.keys(state.doc.sections || {}).length + 1),
  );
  if (!name) return;
  const trimmed = name.trim();
  if (!trimmed) return;
  if (state.doc.sections[trimmed]) {
    toast("err", `section "${trimmed}" already exists`);
    return;
  }
  state.doc.sections[trimmed] = { slots: [], defaultOnNewPage: false };
  state.activeSection = trimmed;
  state.selectedSlot = null;
  markDirty();
  renderAll();
}

function deletePage(name) {
  if (!confirm(`Delete page "${name}"? Modules will stay in the registry; their slots on this page are removed.`)) return;
  delete state.doc.pages[name];
  if (state.activePage === name) {
    const remaining = Object.keys(state.doc.pages);
    state.activePage = remaining.length ? remaining[0] : "home";
    if (!state.doc.pages[state.activePage]) ensurePage(state.activePage);
  }
  state.selectedSlot = null;
  markDirty();
  renderAll();
}

function deleteSection(name) {
  if (!confirm(`Delete section "${name}"? Pages that included it lose those slots; modules stay in the registry.`)) return;
  delete state.doc.sections[name];
  // Strip references + overrides from every page so the doc stays
  // internally consistent (matches the agent-side DeleteSection behavior).
  for (const page of Object.values(state.doc.pages)) {
    ensurePageDefaults(page);
    page.sections = page.sections.filter(s => s !== name);
    page.sectionOverrides = page.sectionOverrides.filter(o => o.section !== name);
  }
  if (state.activeSection === name) {
    const remaining = Object.keys(state.doc.sections);
    state.activeSection = remaining.length ? remaining.sort()[0] : null;
  }
  state.selectedSlot = null;
  markDirty();
  renderAll();
}

function deleteSelectedSlot() {
  const sel = state.selectedSlot;
  if (!sel) return;
  if (sel.kind === "page") {
    const page = state.doc.pages[state.activePage];
    if (!page) return;
    page.slots.splice(sel.index, 1);
  } else if (sel.kind === "sectionDefault") {
    const section = state.doc.sections[state.activeSection];
    if (!section) return;
    const removed = section.slots[sel.index];
    section.slots.splice(sel.index, 1);
    // Drop any orphaned overrides across pages — their target slot
    // module is gone. Mirrors the store's section-change validation.
    if (removed) {
      for (const page of Object.values(state.doc.pages)) {
        ensurePageDefaults(page);
        page.sectionOverrides = page.sectionOverrides.filter(
          o => !(o.section === state.activeSection && o.module === removed.module));
      }
    }
  }
  state.selectedSlot = null;
  markDirty();
  renderAll();
}

// HOM-119: section inclusion checkbox on the Layout sidebar.
function toggleSectionInclusion(name, include) {
  const page = ensurePage(state.activePage);
  if (include) {
    if (!page.sections.includes(name)) page.sections.push(name);
  } else {
    page.sections = page.sections.filter(s => s !== name);
    // Drop any overrides for the section we just removed — the override
    // would be orphaned otherwise.
    page.sectionOverrides = page.sectionOverrides.filter(o => o.section !== name);
    // If the selected slot belonged to the removed section, clear it.
    const sel = state.selectedSlot;
    if (sel && (sel.kind === "section" || sel.kind === "override") && sel.section === name) {
      state.selectedSlot = null;
    }
  }
  markDirty();
  renderAll();
}

// HOM-119: snapshot the current section default geometry as a per-page
// override. The next renderCanvas surfaces the override (solid border,
// ✱ badge) and selecting it points the inspector at the override.
function createOverride(section, module) {
  const page = ensurePage(state.activePage);
  if (findOverride(page, section, module)) return;
  const sectionDef = state.doc.sections[section];
  if (!sectionDef) return;
  const slot = (sectionDef.slots || []).find(s => s.module === module);
  if (!slot) return;
  page.sectionOverrides.push({
    section, module,
    x: slot.x, y: slot.y, w: slot.w, h: slot.h,
    zIndex: slot.zIndex || 0,
    hidden: !!slot.hidden,
  });
  state.selectedSlot = { kind: "override", section, module };
  markDirty();
  renderAll();
}

function dropOverride(section, module) {
  const page = state.doc.pages[state.activePage];
  if (!page || !page.sectionOverrides) return;
  page.sectionOverrides = page.sectionOverrides.filter(
    o => !(o.section === section && o.module === module));
  // After dropping, re-select the section default slot.
  state.selectedSlot = { kind: "section", section, module };
  markDirty();
  renderAll();
}

function markDirty() { state.dirty = true; renderSaveStatus(); }

// ---------- drag / resize ----------
// HOM-119: drag/resize take a selector and mutate via resolveBackingSlot,
// so dragging a section slot in page context edits the section default
// (no override created), dragging an override edits the override, etc.
function beginDrag(e, sel) {
  e.preventDefault();
  const newSelection = !selectorsEqual(state.selectedSlot, sel);
  state.selectedSlot = sel;
  if (newSelection) renderInspector();
  const slot = resolveBackingSlot(sel);
  if (!slot) { renderCanvas(); return; }
  const startX = e.clientX, startY = e.clientY;
  const origX = slot.x, origY = slot.y;

  const move = (ev) => {
    const dx = (ev.clientX - startX) / state.scale;
    const dy = (ev.clientY - startY) / state.scale;
    slot.x = clamp(snap(origX + dx), 0, state.doc.canvas.width - slot.w);
    slot.y = clamp(snap(origY + dy), 0, state.doc.canvas.height - slot.h);
    renderCanvas();
  };
  const up = () => {
    window.removeEventListener("mousemove", move);
    window.removeEventListener("mouseup", up);
    markDirty();
    renderAll();
  };
  window.addEventListener("mousemove", move);
  window.addEventListener("mouseup", up);
  // First-click re-render so handles appear immediately.
  renderCanvas();
}

function beginResize(e, sel, corner) {
  e.preventDefault();
  const slot = resolveBackingSlot(sel);
  if (!slot) return;
  const startX = e.clientX, startY = e.clientY;
  const origX = slot.x, origY = slot.y, origW = slot.w, origH = slot.h;

  const move = (ev) => {
    const dx = (ev.clientX - startX) / state.scale;
    const dy = (ev.clientY - startY) / state.scale;
    let x = origX, y = origY, w = origW, h = origH;
    if (corner.includes("e")) w = snap(origW + dx);
    if (corner.includes("s")) h = snap(origH + dy);
    if (corner.includes("w")) { x = snap(origX + dx); w = origW - (x - origX); }
    if (corner.includes("n")) { y = snap(origY + dy); h = origH - (y - origY); }
    w = Math.max(SNAP_PX, w);
    h = Math.max(SNAP_PX, h);
    x = clamp(x, 0, state.doc.canvas.width - w);
    y = clamp(y, 0, state.doc.canvas.height - h);
    slot.x = x; slot.y = y; slot.w = w; slot.h = h;
    renderCanvas();
  };
  const up = () => {
    window.removeEventListener("mousemove", move);
    window.removeEventListener("mouseup", up);
    markDirty();
    renderAll();
  };
  window.addEventListener("mousemove", move);
  window.addEventListener("mouseup", up);
}

// ---------- save ----------
async function save() {
  $("save").disabled = true;
  const status = $("save-status");
  status.textContent = "saving…"; status.className = "save-status dirty";
  try {
    const res = await fetch("/canvas/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        canvas: state.doc.canvas,
        sections: state.doc.sections || {},
        pages: state.doc.pages,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "HTTP " + res.status }));
      status.textContent = "save failed"; status.className = "save-status err";
      toast("err", err.error || "save failed");
      $("save").disabled = false;
      return;
    }
    const result = await res.json();
    state.dirty = false;
    status.textContent = "saved"; status.className = "save-status ok";
    setTimeout(() => { if (!state.dirty) status.className = "save-status"; }, 2000);
    const wrote = result.pagesWritten || [];
    const removed = result.pagesDeleted || [];
    const wroteSec = result.sectionsWritten || [];
    const removedSec = result.sectionsDeleted || [];
    const parts = [];
    if (wrote.length) parts.push(`wrote ${wrote.length} page${wrote.length === 1 ? "" : "s"}`);
    if (removed.length) parts.push(`removed ${removed.length} page${removed.length === 1 ? "" : "s"}`);
    if (wroteSec.length) parts.push(`wrote ${wroteSec.length} section${wroteSec.length === 1 ? "" : "s"}`);
    if (removedSec.length) parts.push(`removed ${removedSec.length} section${removedSec.length === 1 ? "" : "s"}`);
    if (result.pagesTfBytes) parts.push(`pages.tf ${result.pagesTfBytes}B`);
    toast("ok", parts.length ? parts.join(" · ") : "no changes");
  } catch (e) {
    status.textContent = "save failed"; status.className = "save-status err";
    toast("err", "network error: " + e.message);
    $("save").disabled = false;
  }
}

// ---------- utilities ----------
function snap(v) { return Math.round(v / SNAP_PX) * SNAP_PX; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

let toastTimer = null;
function toast(kind, msg) {
  const el = $("toast");
  el.textContent = msg;
  el.className = "toast show " + (kind || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = "toast"; }, 3200);
}

// ---------- wire ----------
$("new-page").onclick = newPage;
$("save").onclick = save;
// HOM-120: commit on blur or Enter so partial typing doesn't reflow.
function wireCanvasSizeInput(el, field) {
  el.addEventListener("change", () => commitCanvasSize(field, el.value));
  el.addEventListener("keydown", (e) => {
    if (e.key === "Enter") el.blur();
  });
}
wireCanvasSizeInput($("canvas-w"), "width");
wireCanvasSizeInput($("canvas-h"), "height");
$("view-layout").onclick = () => {
  state.view = "layout";
  state.selectedSlot = null;
  renderAll();
};
$("view-sections").onclick = () => {
  state.view = "sections";
  state.selectedSlot = null;
  // Default to the first section, or create a sentinel "untitled" via
  // the +Section prompt the user already drives. No auto-create here.
  if (!state.activeSection) {
    const names = Object.keys(state.doc.sections || {}).sort();
    state.activeSection = names[0] || null;
  }
  renderAll();
};
$("view-modules").onclick = () => {
  state.view = "modules";
  state.editingModuleId = null;
  renderAll();
};
$("debug-toggle").onclick = toggleDebug;
$("overlap-resolve").onclick = autoResolveOverlaps;
$("add-module-btn").onclick = () => { state.editingModuleId = ""; renderModulesView(); };
window.addEventListener("keydown", (e) => {
  if ((e.key === "Delete" || e.key === "Backspace")
      && state.selectedSlot
      && e.target.tagName !== "INPUT"
      && e.target.tagName !== "TEXTAREA") {
    // Delete key only operates on slots we own — page slots and
    // section-default slots. Section slots in page context and overrides
    // have their own dedicated actions in the inspector (Drop override)
    // and getting deleted from a section's slot list would surprise the
    // user editing a page.
    const k = state.selectedSlot.kind;
    if (k === "page" || k === "sectionDefault") {
      e.preventDefault();
      deleteSelectedSlot();
    }
  }
});
$("canvas").addEventListener("mousedown", (e) => {
  if (e.target === $("canvas") || e.target === $("empty-note")) {
    state.selectedSlot = null;
    renderCanvas();
    renderInspector();
  }
});
window.addEventListener("resize", () => renderCanvas());
window.addEventListener("beforeunload", (e) => {
  if (state.dirty) { e.preventDefault(); e.returnValue = ""; }
});

loadState();
</script>
</body>
</html>
