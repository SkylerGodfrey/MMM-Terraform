name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-agent:
    name: Build Agent
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux-amd64
          - goos: linux
            goarch: arm64
            platform: linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            platform: linux-arm
          - goos: darwin
            goarch: amd64
            platform: macos-amd64
          - goos: darwin
            goarch: arm64
            platform: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          cd magicmirror-agent
          go mod tidy
          go build -trimpath -ldflags="-s -w -X github.com/SkylerGodfrey/magicmirror-agent/internal/api.agentVersion=${{ github.ref_name }}" \
            -o ../magicmirror-agent-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: magicmirror-agent-${{ matrix.platform }}
          path: magicmirror-agent-${{ matrix.platform }}

  build-provider:
    name: Build Provider
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux_amd64
          - goos: linux
            goarch: arm64
            platform: linux_arm64
          - goos: darwin
            goarch: amd64
            platform: macos_amd64
          - goos: darwin
            goarch: arm64
            platform: macos_arm64
          - goos: windows
            goarch: amd64
            platform: windows_amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Provider
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd terraform-provider-magicmirror
          go mod tidy

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../terraform-provider-magicmirror_${{ matrix.platform }}${EXT}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-magicmirror_${{ matrix.platform }}
          path: terraform-provider-magicmirror_${{ matrix.platform }}*

  release:
    name: Create Release
    needs: [build-agent, build-provider]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
